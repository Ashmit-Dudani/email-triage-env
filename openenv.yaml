name: email-triage-env
version: "1.0.0"
description: "Email Triage environment where an AI agent classifies emails, sets priorities, and decides actions."

tasks:
  - id: easy
    name: "Email Category Classification"
    description: "Classify the email into the correct category: work, spam, personal, or promo."
    grader:
      type: deterministic
      score_range: [0.0, 1.0]
      partial_credit: true
    metric: category_score

  - id: medium
    name: "Email Priority Assignment"
    description: "Classify category AND assign the correct priority level: high, medium, or low."
    grader:
      type: deterministic
      score_range: [0.0, 1.0]
      partial_credit: true
    metric: total

  - id: hard
    name: "Email Action Decision"
    description: "Classify category, set priority, AND decide the correct action: reply, ignore, or escalate."
    grader:
      type: deterministic
      score_range: [0.0, 1.0]
      partial_credit: true
      penalties: true
    metric: total

observation:
  type: object
  fields:
    email_id: string
    subject: string
    body: string
    sender_type: string
    emails_remaining: integer
    episode_id: string
    task: string

action:
  type: object
  fields:
    category:
      type: enum
      values: [work, spam, personal, promo]
    priority:
      type: enum
      values: [high, medium, low]
    action_type:
      type: enum
      values: [reply, ignore, escalate]

reward:
  type: float
  range: [0.0, 1.0]

api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

inference:
  script: inference.py
  env_vars:
    - API_KEY
    - API_BASE_URL
    - MODEL_NAME
    - ENV_BASE_URL
  log_format:
    start: "[START] task: {task}"
    step: "[STEP] action: {action} reward: {reward}"
    end: "[END] score: {score}"

deployment:
  platform: "Hugging Face Spaces"
  type: Docker
  port: 7860